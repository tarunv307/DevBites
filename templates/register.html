{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="container">
  <div class="card form-card">
    <h2 class="text-center">Create Your Account</h2>
    <p class="muted text-center mb-3">Start your micro-learning journey today.</p>
    <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" value="{{ username or '' }}" required autofocus>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="emailInput" name="email" value="{{ email or '' }}"
               pattern="^[^\s@]+@[^\s@]+\.[^\s@]+$"
               title="Enter a valid email address, e.g. name@example.com" required>
        <small id="emailHint" class="muted" style="display:none;color:#ef4444;font-size:0.8rem;">Please enter a valid email address.</small>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="confirm_password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
    </form>
    <p class="form-footer">Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
  </div>
</div>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const emailInput = document.getElementById("emailInput");
    const emailHint = document.getElementById("emailHint");
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (emailInput) {
      emailInput.addEventListener("input", () => {
        const valid = emailRegex.test(emailInput.value.trim());
        emailHint.style.display = emailInput.value.length && !valid ? "block" : "none";
        emailInput.style.borderColor = emailInput.value.length && !valid ? "#ef4444" : "";
      });
      emailInput.addEventListener("blur", () => {
        const valid = emailRegex.test(emailInput.value.trim());
        emailHint.style.display = emailInput.value.length && !valid ? "block" : "none";
      });
    }
  });
</script>
{% endblock %}
