{% extends "base.html" %}
{% block title %}Server Error{% endblock %}
{% block content %}
<div class="container">
  <div class="empty-state">
    <div class="empty-state-icon">⚠️</div>
    <h2>500 - Something Went Wrong</h2>
    <p class="muted">Our servers hit a snag. Please try again shortly.</p>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary mt-2">Go Home</a>
  </div>
</div>
{% endblock %}
