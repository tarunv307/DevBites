{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="container">
  <div class="card form-card">
    <h2 class="text-center">Welcome Back</h2>
    <p class="muted text-center mb-3">Log in to continue your learning streak.</p>
    <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Username or Email</label>
        <input type="text" name="identifier" required autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <div class="checkbox-row form-group">
        <input type="checkbox" name="remember" id="remember">
        <label for="remember" style="margin:0;">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Log In</button>
    </form>
    <p class="form-footer">Don't have an account? <a href="{{ url_for('auth.register') }}">Sign up</a></p>
    <p class="form-footer muted">Demo: admin@devbites.com / Admin@123</p>
  </div>
</div>
{% endblock %}
