{% extends "base.html" %}
{% block title %}Checkout{% endblock %}
{% block content %}
<div class="container">
  <div class="card form-card">
    <h2 class="text-center">Checkout</h2>
    <p class="muted text-center mb-3">{{ plan.name }} Plan &mdash; ${{ plan.price }}/month</p>
    <div class="flash flash-info">🔒 This is a simulated payment for demo purposes. No real charges occur.</div>
    <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group">
        <label>Cardholder Name</label>
        <input type="text" name="card_name" placeholder="Jane Doe" required>
      </div>
      <div class="form-group">
        <label>Card Number</label>
        <input type="text" name="card_number" placeholder="4242424242424242" maxlength="19" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Expiry (MM/YY)</label>
          <input type="text" name="expiry" placeholder="12/28" required>
        </div>
        <div class="form-group">
          <label>CVV</label>
          <input type="text" name="cvv" placeholder="123" maxlength="4" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">Pay ${{ plan.price }}</button>
    </form>
    <p class="form-footer"><a href="{{ url_for('payment.pricing') }}">&larr; Back to pricing</a></p>
  </div>
</div>
{% endblock %}
